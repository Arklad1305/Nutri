<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Test Edge Function - Diagnóstico</title>
  <style>
    body {
      font-family: monospace;
      max-width: 800px;
      margin: 50px auto;
      padding: 20px;
      background: #1a1a1a;
      color: #0f0;
    }
    button {
      background: #0f0;
      color: #000;
      border: none;
      padding: 10px 20px;
      cursor: pointer;
      font-weight: bold;
      margin: 10px 5px;
    }
    button:hover {
      background: #0d0;
    }
    .result {
      background: #000;
      padding: 15px;
      margin: 10px 0;
      border: 1px solid #0f0;
      white-space: pre-wrap;
      word-wrap: break-word;
    }
    .error {
      color: #f00;
      border-color: #f00;
    }
    .success {
      color: #0f0;
      border-color: #0f0;
    }
    .warning {
      color: #ff0;
      border-color: #ff0;
    }
    input {
      background: #000;
      color: #0f0;
      border: 1px solid #0f0;
      padding: 10px;
      width: 100%;
      margin: 10px 0;
      font-family: monospace;
    }
  </style>
</head>
<body>
  <h1>🔍 Diagnóstico Edge Function</h1>

  <div>
    <h2>Paso 1: Verificar Sesión</h2>
    <button onclick="checkSession()">Verificar Sesión</button>
    <div id="session-result" class="result"></div>
  </div>

  <div>
    <h2>Paso 2: Probar Edge Function</h2>
    <input type="text" id="test-message" value="200g de salmón" placeholder="Mensaje de prueba">
    <button onclick="testEdgeFunction()">Probar Edge Function</button>
    <div id="edge-result" class="result"></div>
  </div>

  <div>
    <h2>Paso 3: Diagnóstico Completo</h2>
    <button onclick="runFullDiagnostic()">Ejecutar Diagnóstico Completo</button>
    <div id="diagnostic-result" class="result"></div>
  </div>

  <script type="module">
    import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm'

    const SUPABASE_URL = 'https://gdoquewussvvkmwgdgxp.supabase.co'
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imdkb3F1ZXd1c3N2dmttd2dkZ3hwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjkxODAwMzUsImV4cCI6MjA4NDc1NjAzNX0.xO_j1KAiY2ySnJsL9alMDiTvfHIRO9pXMZoue2RBofg'

    window.supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY)

    window.checkSession = async () => {
      const resultDiv = document.getElementById('session-result')
      resultDiv.className = 'result'
      resultDiv.textContent = 'Verificando...'

      try {
        const { data: { session }, error } = await window.supabase.auth.getSession()

        if (error) {
          resultDiv.className = 'result error'
          resultDiv.textContent = `❌ ERROR:\n${JSON.stringify(error, null, 2)}`
          return
        }

        if (!session) {
          resultDiv.className = 'result warning'
          resultDiv.textContent = '⚠️  NO HAY SESIÓN ACTIVA\n\n' +
            'Debes iniciar sesión en la aplicación primero.\n' +
            'Abre la app en otra pestaña y vuelve aquí.'
          return
        }

        resultDiv.className = 'result success'
        resultDiv.textContent = '✅ SESIÓN ACTIVA\n\n' +
          `Usuario: ${session.user.email}\n` +
          `ID: ${session.user.id}\n` +
          `Token expira: ${new Date(session.expires_at * 1000).toLocaleString()}\n\n` +
          `Access Token (primeros 50 chars):\n${session.access_token.substring(0, 50)}...`
      } catch (error) {
        resultDiv.className = 'result error'
        resultDiv.textContent = `❌ ERROR INESPERADO:\n${error.message}\n\n${error.stack}`
      }
    }

    window.testEdgeFunction = async () => {
      const resultDiv = document.getElementById('edge-result')
      const message = document.getElementById('test-message').value

      resultDiv.className = 'result'
      resultDiv.textContent = 'Probando Edge Function...'

      try {
        const { data: { session } } = await window.supabase.auth.getSession()

        if (!session) {
          resultDiv.className = 'result error'
          resultDiv.textContent = '❌ No hay sesión activa. Ejecuta "Verificar Sesión" primero.'
          return
        }

        const apiUrl = `${SUPABASE_URL}/functions/v1/process-food-ai`

        console.log('Llamando a:', apiUrl)
        console.log('Con token:', session.access_token.substring(0, 50) + '...')

        const response = await fetch(apiUrl, {
          method: 'POST',
          headers: {
            'Authorization': `Bearer ${session.access_token}`,
            'Content-Type': 'application/json',
          },
          body: JSON.stringify({ message }),
        })

        const responseText = await response.text()
        let responseData

        try {
          responseData = JSON.parse(responseText)
        } catch {
          responseData = responseText
        }

        if (!response.ok) {
          resultDiv.className = 'result error'

          let diagnosis = `❌ ERROR HTTP ${response.status}\n\n`
          diagnosis += `Respuesta del servidor:\n${JSON.stringify(responseData, null, 2)}\n\n`

          if (responseData.error?.includes('GEMINI_API_KEY')) {
            diagnosis += `🔑 PROBLEMA IDENTIFICADO: GEMINI_API_KEY NO CONFIGURADO\n\n`
            diagnosis += `SOLUCIÓN:\n`
            diagnosis += `1. Ve a https://supabase.com/dashboard/project/gdoquewussvvkmwgdgxp\n`
            diagnosis += `2. Edge Functions → Secrets\n`
            diagnosis += `3. Agrega: GEMINI_API_KEY = <tu-api-key-de-google>\n`
            diagnosis += `4. Espera 1-2 minutos y prueba de nuevo\n`
          } else if (responseData.error?.includes('Unauthorized') || responseData.error?.includes('Authentication')) {
            diagnosis += `🔐 PROBLEMA: Autenticación fallida\n\n`
            diagnosis += `SOLUCIÓN:\n`
            diagnosis += `1. Cierra sesión en la app\n`
            diagnosis += `2. Vuelve a iniciar sesión\n`
            diagnosis += `3. Vuelve a esta página y prueba de nuevo\n`
          }

          resultDiv.textContent = diagnosis
          return
        }

        resultDiv.className = 'result success'
        resultDiv.textContent = '✅ ÉXITO\n\n' + JSON.stringify(responseData, null, 2)

      } catch (error) {
        resultDiv.className = 'result error'
        resultDiv.textContent = `❌ ERROR DE RED:\n${error.message}\n\n${error.stack}`
      }
    }

    window.runFullDiagnostic = async () => {
      const resultDiv = document.getElementById('diagnostic-result')
      resultDiv.className = 'result'
      resultDiv.textContent = 'Ejecutando diagnóstico completo...\n\n'

      let report = '🔍 DIAGNÓSTICO COMPLETO\n'
      report += '=' .repeat(50) + '\n\n'

      try {
        // 1. Verificar sesión
        report += '1️⃣ SESIÓN\n'
        const { data: { session } } = await window.supabase.auth.getSession()

        if (!session) {
          report += '   ❌ No hay sesión activa\n'
          report += '   ➡️  Inicia sesión en la app\n\n'
          resultDiv.textContent = report
          return
        }

        report += `   ✅ Usuario: ${session.user.email}\n`
        report += `   ✅ Token válido hasta: ${new Date(session.expires_at * 1000).toLocaleString()}\n\n`

        // 2. Verificar conectividad con Supabase
        report += '2️⃣ CONECTIVIDAD CON SUPABASE\n'
        const { data, error } = await window.supabase.from('profiles').select('id').limit(1)

        if (error) {
          report += `   ⚠️  Error al conectar con la base de datos: ${error.message}\n\n`
        } else {
          report += '   ✅ Conexión a base de datos OK\n\n'
        }

        // 3. Probar Edge Function
        report += '3️⃣ EDGE FUNCTION\n'
        const apiUrl = `${SUPABASE_URL}/functions/v1/process-food-ai`

        const response = await fetch(apiUrl, {
          method: 'POST',
          headers: {
            'Authorization': `Bearer ${session.access_token}`,
            'Content-Type': 'application/json',
          },
          body: JSON.stringify({ message: 'test diagnóstico' }),
        })

        const responseData = await response.json()

        if (!response.ok) {
          report += `   ❌ Error HTTP ${response.status}\n`
          report += `   Error: ${responseData.error}\n\n`

          if (responseData.error?.includes('GEMINI_API_KEY')) {
            report += '🔑 PROBLEMA ENCONTRADO: GEMINI_API_KEY\n'
            report += 'El API key de Gemini no está configurado en Supabase.\n\n'
            report += 'SOLUCIÓN:\n'
            report += '1. Ve a: https://makersuite.google.com/app/apikey\n'
            report += '2. Crea un API Key de Gemini\n'
            report += '3. Ve a: https://supabase.com/dashboard/project/gdoquewussvvkmwgdgxp\n'
            report += '4. Edge Functions → Secrets\n'
            report += '5. Agrega: GEMINI_API_KEY = <tu-api-key>\n'
            report += '6. Espera 1-2 minutos\n'
          } else if (responseData.error?.includes('Unauthorized')) {
            report += '🔐 PROBLEMA ENCONTRADO: AUTENTICACIÓN\n'
            report += 'El token de sesión no es válido.\n\n'
            report += 'SOLUCIÓN:\n'
            report += '1. Cierra sesión en la app\n'
            report += '2. Vuelve a iniciar sesión\n'
            report += '3. Recarga esta página\n'
          } else {
            report += '❓ ERROR DESCONOCIDO\n'
            report += `Detalles: ${JSON.stringify(responseData, null, 2)}\n`
          }
        } else {
          report += '   ✅ Edge Function funcionando correctamente\n'
          report += '   ✅ Gemini API respondió correctamente\n\n'
          report += '🎉 TODO FUNCIONA CORRECTAMENTE\n'
        }

        resultDiv.textContent = report

      } catch (error) {
        report += `\n❌ ERROR CRÍTICO:\n${error.message}\n\n${error.stack}`
        resultDiv.className = 'result error'
        resultDiv.textContent = report
      }
    }
  </script>
</body>
</html>
