<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Debug Auth 401</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="bg-gray-900 text-white p-8">
  <div class="max-w-4xl mx-auto">
    <h1 class="text-3xl font-bold mb-6">🔍 Debug Error 401</h1>

    <div class="space-y-4">
      <!-- Login -->
      <div class="bg-gray-800 p-4 rounded-lg">
        <h2 class="text-xl font-semibold mb-2">1. Login</h2>
        <input
          type="email"
          id="email"
          placeholder="Email"
          class="bg-gray-700 px-4 py-2 rounded text-white w-full mb-2"
        />
        <input
          type="password"
          id="password"
          placeholder="Password"
          class="bg-gray-700 px-4 py-2 rounded text-white w-full mb-2"
        />
        <button
          onclick="login()"
          class="bg-blue-600 hover:bg-blue-700 px-4 py-2 rounded text-white w-full"
        >
          🔐 Login
        </button>
        <div id="login-result" class="mt-2 text-sm"></div>
      </div>

      <!-- Check Session -->
      <div class="bg-gray-800 p-4 rounded-lg">
        <h2 class="text-xl font-semibold mb-2">2. Verificar Sesión</h2>
        <button
          onclick="checkSession()"
          class="bg-green-600 hover:bg-green-700 px-4 py-2 rounded text-white w-full"
        >
          ✅ Ver Sesión Actual
        </button>
        <div id="session-result" class="mt-2 text-sm break-all"></div>
      </div>

      <!-- Test Edge Function -->
      <div class="bg-gray-800 p-4 rounded-lg">
        <h2 class="text-xl font-semibold mb-2">3. Test Edge Function</h2>
        <input
          type="text"
          id="test-message"
          value="100g de arroz blanco"
          class="bg-gray-700 px-4 py-2 rounded text-white w-full mb-2"
        />
        <button
          onclick="testEdgeFunction()"
          class="bg-purple-600 hover:bg-purple-700 px-4 py-2 rounded text-white w-full"
        >
          🚀 Llamar process-food-ai
        </button>
        <div id="edge-result" class="mt-2 text-sm break-all"></div>
      </div>

      <!-- Logs -->
      <div class="bg-gray-800 p-4 rounded-lg">
        <h2 class="text-xl font-semibold mb-2">📋 Console Logs</h2>
        <div id="console-logs" class="text-xs font-mono bg-black p-3 rounded max-h-96 overflow-y-auto"></div>
      </div>
    </div>
  </div>

  <script>
    // Override console.log para capturar en UI
    const originalLog = console.log;
    const originalError = console.error;
    const logsDiv = document.getElementById('console-logs');

    function addLog(msg, type = 'info') {
      const time = new Date().toLocaleTimeString();
      const color = type === 'error' ? 'text-red-400' : type === 'success' ? 'text-green-400' : 'text-blue-400';
      logsDiv.innerHTML += `<div class="${color}">[${time}] ${msg}</div>`;
      logsDiv.scrollTop = logsDiv.scrollHeight;
    }

    console.log = function(...args) {
      originalLog.apply(console, args);
      addLog(args.join(' '), 'info');
    };

    console.error = function(...args) {
      originalError.apply(console, args);
      addLog('ERROR: ' + args.join(' '), 'error');
    };

    // Supabase client
    let supabase = null;

    // Cargar config del .env o localStorage
    const SUPABASE_URL = localStorage.getItem('SUPABASE_URL') || prompt('SUPABASE_URL:', 'https://YOUR_PROJECT.supabase.co');
    const SUPABASE_ANON_KEY = localStorage.getItem('SUPABASE_ANON_KEY') || prompt('SUPABASE_ANON_KEY:', 'eyJ...');

    localStorage.setItem('SUPABASE_URL', SUPABASE_URL);
    localStorage.setItem('SUPABASE_ANON_KEY', SUPABASE_ANON_KEY);

    console.log('Inicializando Supabase...');
    console.log('URL:', SUPABASE_URL);
    console.log('ANON_KEY (preview):', SUPABASE_ANON_KEY.substring(0, 30) + '...');

    supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    async function login() {
      const result = document.getElementById('login-result');
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;

      if (!email || !password) {
        result.innerHTML = '❌ Completa email y password';
        return;
      }

      result.innerHTML = '🔄 Iniciando sesión...';
      console.log('Intentando login con:', email);

      try {
        const { data, error } = await supabase.auth.signInWithPassword({
          email,
          password
        });

        if (error) {
          result.innerHTML = `❌ ${error.message}`;
          console.error('Login error:', error);
          return;
        }

        result.innerHTML = `✅ Login exitoso. User: ${data.user.email}`;
        console.log('Login exitoso:', data);
        addLog('✅ Login exitoso', 'success');

        // Auto check session
        setTimeout(checkSession, 500);
      } catch (err) {
        result.innerHTML = `❌ ${err.message}`;
        console.error('Login exception:', err);
      }
    }

    async function checkSession() {
      const result = document.getElementById('session-result');
      result.innerHTML = '🔄 Obteniendo sesión...';

      try {
        const { data: { session }, error } = await supabase.auth.getSession();

        if (error) {
          result.innerHTML = `❌ ${error.message}`;
          console.error('Session error:', error);
          return;
        }

        if (!session) {
          result.innerHTML = '❌ No hay sesión activa. Haz login primero.';
          console.error('No session found');
          return;
        }

        const tokenPreview = session.access_token.substring(0, 50) + '...';
        const expiresAt = new Date(session.expires_at * 1000).toLocaleString();

        result.innerHTML = `
          ✅ <strong>Sesión activa</strong><br>
          <strong>User ID:</strong> ${session.user.id}<br>
          <strong>Email:</strong> ${session.user.email}<br>
          <strong>Token (preview):</strong> ${tokenPreview}<br>
          <strong>Expira:</strong> ${expiresAt}
        `;

        console.log('Session completa:', session);
        addLog('✅ Sesión válida', 'success');
      } catch (err) {
        result.innerHTML = `❌ ${err.message}`;
        console.error('Session exception:', err);
      }
    }

    async function testEdgeFunction() {
      const result = document.getElementById('edge-result');
      const message = document.getElementById('test-message').value;

      result.innerHTML = '🔄 Llamando a Edge Function...';
      console.log('=== INICIANDO TEST EDGE FUNCTION ===');

      try {
        // Get session
        const { data: { session }, error: sessionError } = await supabase.auth.getSession();

        if (sessionError || !session) {
          result.innerHTML = '❌ No hay sesión. Haz login primero.';
          console.error('No session for Edge Function call');
          return;
        }

        console.log('Token para Edge Function:', session.access_token.substring(0, 30) + '...');

        const apiUrl = `${SUPABASE_URL}/functions/v1/process-food-ai`;
        console.log('URL:', apiUrl);

        const headers = {
          'Authorization': `Bearer ${session.access_token}`,
          'Content-Type': 'application/json',
          'apikey': SUPABASE_ANON_KEY,
        };

        console.log('Headers enviados:', {
          Authorization: headers.Authorization.substring(0, 30) + '...',
          'Content-Type': headers['Content-Type'],
          apikey: headers.apikey.substring(0, 30) + '...'
        });

        const body = { message };
        console.log('Body:', body);

        const response = await fetch(apiUrl, {
          method: 'POST',
          headers,
          body: JSON.stringify(body)
        });

        console.log('Response status:', response.status);
        console.log('Response statusText:', response.statusText);
        console.log('Response headers:', Object.fromEntries(response.headers.entries()));

        const data = await response.json();
        console.log('Response data:', data);

        if (response.ok && data.success) {
          result.innerHTML = `
            ✅ <strong>Edge Function OK</strong><br>
            <strong>Food:</strong> ${data.data.food_name}<br>
            <strong>Calories:</strong> ${data.data.calories}<br>
            <strong>Reply:</strong> ${data.data.reply_text}
          `;
          addLog('✅ Edge Function exitosa', 'success');
        } else {
          result.innerHTML = `
            ❌ <strong>Error ${response.status}</strong><br>
            <strong>Error:</strong> ${data.error || 'Unknown'}<br>
            <strong>Details:</strong> ${data.details || 'N/A'}
          `;
          console.error('Edge Function error:', data);
        }
      } catch (err) {
        result.innerHTML = `❌ Exception: ${err.message}`;
        console.error('Edge Function exception:', err);
      }
    }
  </script>
</body>
</html>
